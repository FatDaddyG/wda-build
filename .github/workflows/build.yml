name: Build WDA for iOS 16

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout WebDriverAgent v5.15.3
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: v5.15.3

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install Carthage
        run: brew install carthage

      - name: Cache Carthage
        uses: actions/cache@v4
        with:
          path: Carthage
          key: carthage-ios16-${{ hashFiles('Cartfile.resolved') }}
          restore-keys: carthage-ios16-

      - name: Bootstrap dependencies
        timeout-minutes: 20
        run: carthage bootstrap --use-xcframeworks --platform iOS --cache-builds

      - name: Build WDA (unsigned)
        timeout-minutes: 12
        run: |
          xcodebuild clean build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath ./build

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r ./build/Build/Products/Debug-iphoneos/WebDriverAgentRunner-Runner.app Payload/
          zip -r WebDriverAgentRunner-iOS16.ipa Payload/
          echo "IPA size: $(du -sh WebDriverAgentRunner-iOS16.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-iOS16
          path: WebDriverAgentRunner-iOS16.ipa
          retention-days: 7
