name: Build WDA for iOS 16

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout WebDriverAgent v5.15.3
        uses: actions/checkout@v4
        with:
          repository: appium/WebDriverAgent
          ref: v5.15.3

      - name: Select Xcode 15.4
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Resolve Swift Package dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner

      - name: Build WDA (unsigned)
        timeout-minutes: 20
        run: |
          xcodebuild clean build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath ./build

      - name: Ad-hoc sign nested bundles (required for Sideloadly re-signing)
        run: |
          APP=./build/Build/Products/Debug-iphoneos/WebDriverAgentRunner-Runner.app
          # Sign all nested xctest bundles and their binaries so Sideloadly will re-sign them
          find "$APP" -name "*.xctest" | while read bundle; do
            binary="$bundle/$(basename $bundle .xctest)"
            if [ -f "$binary" ]; then
              codesign --force --sign - --timestamp=none "$binary"
              echo "Ad-hoc signed: $binary"
            fi
            codesign --force --sign - --timestamp=none "$bundle"
            echo "Ad-hoc signed bundle: $bundle"
          done
          find "$APP" -name "*.framework" | while read fw; do
            codesign --force --sign - --timestamp=none "$fw"
          done

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r ./build/Build/Products/Debug-iphoneos/WebDriverAgentRunner-Runner.app Payload/
          zip -r WebDriverAgentRunner-iOS16.ipa Payload/
          echo "IPA size: $(du -sh WebDriverAgentRunner-iOS16.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-iOS16
          path: WebDriverAgentRunner-iOS16.ipa
          retention-days: 7
